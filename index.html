const DATA = {"days": [{"date": "2026-07-11", "weekday": "토", "intro": "오늘 소식은 하나같이 '당연하다'고 여겨온 전제를 건드립니다. 화산은 세 가지 방식으로 만들어진다는 분류, 지구가 한꺼번에 마를 수 있다는 걱정, 해안선은 고정돼 있다는 법의 가정, 위험한 호수는 크다는 통념 — 넷 다 그 빈칸을 드러냅니다.", "articles": [{"id": "2026-07-11-etna-fourth-type", "region": "해외", "category": "지형·지질·재해", "title": "에트나 화산은 '제4의 유형'일지 모른다", "journal": "Journal of Geophysical Research: Solid Earth · 2026", "researchers": "로잔대(UNIL) 지구과학·환경학부 Sébastien Pilet 교수 — 이탈리아 국립지구물리·화산연구소(INGV) 공동", "source": {"name": "ScienceDaily", "url": "https://www.sciencedaily.com/releases/2026/07/260709160653.htm"}, "summary": "로잔대와 이탈리아 화산연구소(INGV)가 JGR: Solid Earth에 발표했다. 유럽 최고 활화산 에트나가 수렴·발산·열점이라는 기존 세 형성 유형 어디에도 맞지 않고, 지하 약 80km에 미리 있던 오래된 마그마 주머니가 판 충돌로 갈라진 균열을 타고 솟아 만들어졌다고 봤다. 50만 년치 암석을 분석한 결과로, 지금껏 해저 소형 구조에서만 보이던 '쁘띠스팟(petit-spot)' 화산일 수 있다는 것이다.", "body": [{"h": "핵심 발견", "p": "화산은 보통 세 가지 방식으로 설명된다 — 판이 벌어지는 발산경계, 판이 부딪혀 한쪽이 밀려드는 수렴경계, 그리고 판 한가운데를 뚫는 열점이다. 로잔대 연구진은 이탈리아 시칠리아의 에트나가 이 세 유형 어디에도 깔끔히 들어맞지 않는다고 본다. 분출 직전에 마그마가 새로 만들어지는 대신, 지하 깊은 곳에 이미 존재하던 '오래된 마그마 주머니'가 위로 밀려 올라와 분출을 이어간다는 것이다."}, {"h": "어떻게 밝혔나", "p": "연구진은 50만 년에 걸친 에트나 화산암 시료를 분석했다. 아프리카판과 유라시아판이 충돌하면서 미리 형성돼 있던 마그마 주머니가 서서히 위로 운반되고, 판이 섭입대 부근에서 휘어질 때 생긴 균열을 따라 마그마가 지각을 뚫고 상승한다는 그림이다. 마그마의 근원 깊이는 지표 아래 약 80km(50마일)로 추정됐다."}, {"h": "의미", "p": "연구진은 에트나가 지금껏 해저의 작은 화산 구조에서만 확인됐던 '쁘띠스팟(petit-spot)' 화산의 육상판, 즉 네 번째 화산 범주에 해당할 수 있다고 제안한다. 50만 년 넘는 나이에 해발 3,000m 이상 솟은 이 거대 활화산이 '예외'가 아니라 새로운 '유형'이라면, 화산 형성의 표준 분류 자체를 손봐야 한다는 뜻이다."}], "talk": "교과서 화산 분류표에 칸을 하나 더 그려야 할까요. '예외'로 남길지 '유형'으로 올릴지가 늘 논쟁이죠.", "tags": ["화산", "판구조론", "마그마", "petit-spot", "지질"], "curriculum": [{"code": "12여지02-04", "gloss": "지형 경관과 지오사이트·지오투어리즘"}]}, {"id": "2026-07-11-drought-desync", "region": "해외", "category": "기후·기상", "title": "'전 지구 동시 가뭄'은 생각만큼 오지 않는다", "journal": "Communications Earth & Environment · 2026", "researchers": "인도공과대 간디나가르(IITGN) Udit Bhatia 박사 주도 — 독일 헬름홀츠 환경연구센터(라이프치히) 공동", "source": {"name": "ScienceDaily", "url": "https://www.sciencedaily.com/releases/2026/06/260621031531.htm"}, "summary": "인도공과대 간디나가르(IITGN)와 독일 헬름홀츠 연구진이 Communications Earth & Environment에 냈다. 1901~2020년 자료에서 지구 육지의 1.8~6.5%만 동시에 가뭄을 겪었고, '지구 1/6이 한꺼번에 마른다'던 기존 추정보다 훨씬 좁았다. 엘니뇨·라니냐가 가뭄 지역을 이리저리 옮겨 동시화를 막는 '셔플' 효과 덕분이라는 설명이다.", "body": [{"h": "핵심 발견", "p": "지구가 한꺼번에 마를 수 있다는 우려는 데이터로 보면 과장돼 있었다. 1901~2020년 기후 자료를 분석한 결과, 여러 대륙이 동시에 가뭄을 겪는 '동기화 가뭄'은 어느 시점에도 지구 육지의 약 1.8~6.5%에만 걸쳐 있었다. 지구의 6분의 1이 동시에 마를 수 있다던 이전 추정치보다 훨씬 낮은 값이다."}, {"h": "메커니즘 — 바다가 만드는 '셔플'", "p": "해양이 주도하는 기후 진동, 특히 엘니뇨-남방진동(ENSO)이 가뭄을 특정 지역에 몰아넣되 전 지구 동시화는 막는다. 엘니뇨 국면에서는 호주가 대표적인 가뭄 허브로 떠오르고, 라니냐는 가뭄 지역을 지리적으로 다시 흩뜨린다. 이 '뒤섞기' 효과가 여러 대륙이 한꺼번에 마르는 상황을 억제한다는 것이다."}, {"h": "의미 — 식량 안보로 읽기", "p": "연구는 중간 강도의 가뭄만으로도 주요 곡창지대의 흉작 확률이 25%를 넘고, 옥수수·콩은 40~50%를 웃돈다고 봤다. 다만 가뭄이 모든 지역을 동시에 덮치는 일은 드물기 때문에, 교역과 비축 같은 전략으로 전 지구 식량 공급을 안정시킬 여지가 있다고 짚는다. '동시에 마르지 않는다'는 사실이 곧 대응의 지렛대가 되는 셈이다."}], "talk": "동시에 마르지 않는다는 건 교역·비축으로 버틸 여지가 있다는 뜻이죠. 곡물 대부분을 수입하는 한국엔 오히려 묵직한 이야기입니다.", "tags": ["가뭄", "엘니뇨", "ENSO", "식량안보", "기후"], "curriculum": [{"code": "12기지02-01", "gloss": "세계 기후재난의 실제와 쟁점"}, {"code": "12세지03-02", "gloss": "세계 식량 문제의 구조적 원인"}]}, {"id": "2026-07-11-beach-law-anthropocene", "region": "해외", "category": "지정학·국제", "title": "\"해안선은 고정돼 있다\"는 법의 전제가 흔들린다", "journal": "Ocean & Coastal Management · 2026 · 'Beach law in the Anthropocene'", "researchers": "서던크로스대 Tim Smith 교수 — 퀸즐랜드대 Justine Bell-James 교수 공동", "source": {"name": "Phys.org", "url": "https://phys.org/news/2026-07-tides-tensions-rethink-coastal-law.html"}, "summary": "서던크로스대 팀이 Ocean & Coastal Management에 '인류세의 해변법'을 발표했다. 서구 법체계는 해안선과 해안 소유권이 고정돼 있다고 전제하지만, 기후변화가 그 전제를 깨고 있다고 짚었다. 호주 해수면은 1993년 이후 13cm 올랐고 2020~2050년 16cm 더 오를 전망이다. 누가 해변을 소유하고 드나들며, 적응 비용은 누가 지느냐를 두고 분쟁이 커진다는 것이다.", "body": [{"h": "핵심 주장", "p": "호주를 중심으로 캘리포니아·이탈리아 사례까지 비교한 이 연구는, 서구 법체계가 '해안선은 안정적이고 해안 사유재산권은 고정돼 있다'는 전제 위에 서 있다고 지적한다. 그러나 기후변화로 해안선이 움직이기 시작하면서 이 전제 자체가 무효가 되고 있다는 것이다."}, {"h": "무엇이 문제인가", "p": "현행 해안 거버넌스는 사유재산권과 단기 경제성을 앞세우는 반면, 환경 보호·원주민의 가치·공공의 해변 접근권은 뒤로 밀린다. 그 결과 누가 해변을 소유하는지, 누가 드나들 수 있는지, 늘어나는 적응 비용은 누가 부담하는지를 두고 분쟁이 커진다. 호주 해수면은 1993년 이후 이미 13cm 올랐고, 현재 추세라면 2020~2050년 사이 16cm가 더 오를 것으로 전망된다."}, {"h": "제안", "p": "연구진은 기존 제도를 조금씩 손보는 방식으로는 부족하다고 본다. 대신 유연하고 '공유'에 기반한 소유 모델, 그리고 다른 세계관(원주민의 관점 등)을 담아내면서 사유재산이 공공의 해변 접근을 가로막지 못하게 하는 법 틀을 제안한다. 해변을 '고정된 재산'이 아니라 '움직이는 공공 공간'으로 다시 정의하자는 것이다."}], "talk": "해변은 사유재산일까요, 공공재일까요. 사유지가 물에 잠기면 '바다가 된 내 땅'의 경계는 어디일지 — 우리 연안에도 닥칠 질문입니다.", "tags": ["해수면상승", "해안관리", "인류세", "재산권", "인문지리"], "curriculum": [{"code": "12한탐04-02", "gloss": "해안지역의 변화, 개발과 보존"}, {"code": "12기지02-02", "gloss": "기후변화 영향의 지역별 차별성"}]}, {"id": "2026-07-11-small-alpine-lakes", "region": "해외", "category": "지형·지질·재해", "title": "지도에 없는 작은 산정호수가 홍수의 사각지대다", "journal": "Nature Sustainability · 2026 · DOI 10.1038/s41893-026-01873-0", "researchers": "애버딘대 — 인도과학원(IISc)·교토대 공동", "source": {"name": "Phys.org", "url": "https://phys.org/news/2026-07-tiny-mountain-lakes-pose-big.html"}, "summary": "애버딘대·인도과학원·교토대 공동연구가 Nature Sustainability에 발표했다. 빙하 후퇴와 영구동토 융해로 생긴 작은 고산 호수들이 감시 데이터베이스에서 빠져 홍수 위험이 방치돼 있다고 경고했다. 위험은 호수 크기가 아니라 낙석·산사태 같은 방아쇠와 하류 취약성이 좌우하며, 2025년 네팔 리미 계곡의 무명 호수 범람은 국제사회의 주목조차 받지 못했다.", "body": [{"h": "핵심 발견", "p": "빙하가 물러나고 영구동토가 녹으면서 생긴 작은 고산 호수들이 세계 재해 평가에서 체계적으로 빠져 있다. 연구진은 이 '작은 고산 호수 범람(SALO, small alpine lake outburst)'이 규모가 작다는 이유로 감시 데이터베이스에서 제외돼 왔지만, 실제로는 상당한 홍수 위험을 안고 있다고 지적한다."}, {"h": "메커니즘 — 크기가 전부가 아니다", "p": "SALO는 여러 방아쇠로 터진다. 낙석·빙괴 붕괴·산사태가 취약한 호수로 쏟아지거나, 물을 가둔 천연 둑이 무너지거나, 지진과 극한 강우가 겹칠 때다. 연구진은 '위험은 호수 크기만으로 결정되지 않으며, 환경적 방아쇠·지형 불안정성·하류 취약성의 조합이 좌우한다'고 강조한다."}, {"h": "의미 — 누가 목록에서 빠지나", "p": "2025년 사례가 문제의 폭을 보여준다. 네팔 리미 계곡에서는 알려지지 않았던 작은 호수가 범람해 기반시설을 파괴했지만 국제사회의 주목은 거의 받지 못했고, 페루 바유나라후 빙하 지역의 유사 사건은 인명 피해를 내고서야 빠른 대응을 이끌어냈다. 원격 산악 공동체일수록 경보 체계와 제도적 지원이 부족하다는 격차가 드러난다. 연구진은 플래닛스코프 위성영상, SAR/InSAR, 드론, AI 매핑 같은 지구관측 기술로 그동안 어려웠던 소형·역동적 호수 감시가 가능해질 수 있다고 제안한다."}], "talk": "'작아서 위험 목록에서 빠진' 곳이 정작 사람을 덮칩니다. 재해 지도는 무엇을 '셀 만한 것'으로 치느냐에서 이미 갈리는 셈이죠.", "tags": ["빙하호수", "GLOF", "자연재해", "원격탐사", "영구동토"], "curriculum": [{"code": "12한탐04-03", "gloss": "자연재해의 유형과 경감 대책"}]}, {"id": "2026-07-11-kimmandeok-academy", "region": "국내", "category": "기후·기상", "title": "김만덕 아카데미, 18세기 제주의 이상기후와 재난을 다룬다", "journal": "헤드라인제주 · 2026.7.10", "researchers": "김오진 제주기후문화연구소 소장(지리학 박사)", "source": {"name": "헤드라인제주", "url": "https://www.headlinejeju.co.kr/news/articleView.html?idxno=595782"}, "summary": "김만덕기념관이 8~9월 교육프로그램 '김만덕 아카데미'를 운영한다. '조선시대 제주도의 이상기후와 문화'(2018)의 저자인 김오진 지리학 박사가 '18세기 조선시대 제주의 재난과 대응'을 주제로 당시 기후와 자연환경이 사회에 미친 영향을 강의한다.", "body": [{"h": "무엇을", "p": "김만덕기념관이 8~9월 '김만덕 아카데미'를 연다. 지리학 박사이자 '조선시대 제주도의 이상기후와 문화'(2018)의 저자인 김오진 제주기후문화연구소 소장이 '18세기 조선시대 제주의 재난과 대응'을 주제로, 18세기 제주의 기후와 자연환경이 당대 사회에 미친 영향을 짚는다. 역사 속 기후재난과 그 대응을 지리학의 시선으로 읽는 자리다."}], "talk": "오늘 해외 소식이 '지금의 기후재난'을 다뤘다면, 이 강의는 '역사 속 기후재난'을 봅니다. 과거의 대응에서 배울 대목이 있을까요.", "tags": ["지리교육", "역사기후", "제주", "자연재해"], "curriculum": [{"code": "12기지02-01", "gloss": "세계 기후재난의 실제와 쟁점"}]}, {"id": "2026-07-11-parkjeongjae-lecture", "region": "국내", "category": "기후·기상", "title": "박정재 교수 '기후가 만든 한국인의 역사' 대중강연", "journal": "충남일보 · 2026.7.9", "researchers": "박정재 서울대 지리학과 교수", "source": {"name": "충남일보", "url": "http://www.chungnamilbo.co.kr/news/articleView.html?idxno=898050"}, "summary": "한밭도서관 '인문학에게 길을 묻다' 강연 시리즈에서 서울대 지리학과 박정재 교수가 8월 27일 '한국인의 기원: 아프리카에서 한반도까지, 기후가 만든 한국인의 역사'를 주제로 강연한다. 인류 이동과 기후변화가 한국인 형성 과정에 미친 영향을 다룬다.", "body": [{"h": "무엇을", "p": "한밭도서관이 7~11월 진행하는 '인문학에게 길을 묻다' 강연 시리즈의 한 자리로, 8월 27일 서울대 지리학과 박정재 교수가 '한국인의 기원: 아프리카에서 한반도까지, 기후가 만든 한국인의 역사'를 강연한다. 인류의 이동과 기후변화가 한국인의 형성 과정에 어떤 영향을 미쳤는지를 풀어내는 내용이다."}], "talk": "기후는 오늘의 재난만이 아니라 '우리가 어떻게 여기까지 왔나'까지 설명합니다. 인류 이동과 기후를 잇는 수업 각도로 참고할 만합니다.", "tags": ["지리교육", "기후", "인류이동", "대중강연"], "curriculum": [{"code": "10통사1-03-01", "gloss": "자연환경이 인간 생활에 미치는 영향"}]}]}, {"date": "2026-07-10", "weekday": "금", "intro": "교과서 한 줄을 고쳐 써야 할지도 모르는 소식이 여럿입니다. 대도시가 계속 커진다는 전제, 지진 규모가 곧 피해라는 설명, 해안 절벽은 예고 없이 무너진다는 통념 — 오늘 기사들은 모두 그 자리를 건드립니다.", "articles": [{"id": "2026-07-10-city-growth", "region": "해외", "category": "인구·도시", "title": "대도시의 성장 우위는 도시화가 끝나면 사라진다", "journal": "PNAS · 2026.6.25 · DOI 10.1073/pnas.2529430123", "researchers": "복잡성과학허브(CSH)·ETH 취리히 — Andrea Musso, Frank Neffke 등", "source": {"name": "EurekAlert (PNAS 보도자료)", "url": "https://www.eurekalert.org/news-releases/1133791"}, "summary": "위성영상과 99개국 센서스를 행정경계 대신 1km² 격자로 다시 그려 추적했더니, 도시화 초기엔 대도시가 평균보다 7.3% 빨리 크지만 도시화가 진전되면 그 우위가 사실상 사라졌다. 2100년 100만 이상 도시 거주 인구는 세계 인구의 38%로, 기존 추세 예측보다 4억 5,000만 명 적을 전망이다.", "body": [{"h": "핵심 발견", "p": "대도시의 빠른 성장은 '항상 그런 것'이 아니라 '도시화의 한 국면'이었다. 도시화가 덜 진행된 나라에서는 인구 100만 이상 도시가 평균적인 도시보다 약 7.3% 빠르게 성장했지만, 이미 도시화가 진전된 나라에서는 대도시가 전국 평균과 거의 같은 속도로만 자랐다. 연구진은 이를 '도시 성장의 생애주기(life cycle of urban growth)'라 불렀다 — 지역이 달라도 도시화 수준을 맞춰 보면 같은 단계를 밟더라는 것이다."}, {"h": "어떻게 밝혔나", "p": "두 개의 대형 데이터셋을 썼다. 하나는 2025년 세계 인구의 94%를 담는 99개국의 1975~2025년 위성영상으로 도시의 물리적 확장을 추적한 것, 다른 하나는 5억 건이 넘는 미국 센서스 기록(1850~2020년)을 약 4만 개 지명에 연결해 재구성한 것이다. 핵심은 경계 설정 방식이다. 행정경계 대신 약 1km²짜리 격자를 인구·건축밀도로 도시/농촌으로 분류하고 그 덩어리를 시계열로 추적해, 행정경계가 만들어내는 왜곡을 걷어냈다."}, {"h": "무엇을 뒤집나", "p": "현재 추세를 그대로 늘려 잡은 예측은 대도시 인구를 과대평가한다. 2100년 100만 이상 도시에 사는 인구는 세계 인구의 38%로 전망되는데(현재 24%, 1975년 11%), 이는 단순 외삽보다 4억 5,000만 명이 적은 수치다. 인프라·주택·기후적응 계획이 깔고 있던 '대도시는 계속 커진다'는 전제 자체가 바뀐다."}, {"h": "덤 — 대도시의 명암", "p": "같은 연구는 대도시의 초선형 효과도 정리했다. 인구 100만 도시 주민은 인구 1만 소도시 주민보다 교통에 쓰는 시간이 두 배 넘고 특정 질병에 걸릴 확률이 약 세 배 높지만, 동시에 세 배 넘게 혁신적이고 거의 두 배 생산적이다. 규모의 이득과 부담이 함께 커진다는 점은 그대로다."}], "talk": "종주도시화 단원은 \"대도시는 계속 커진다\"를 깔고 서 있죠. 도시화율 90%를 넘긴 한국은 이 곡선의 어디쯤 있을까요.", "tags": ["도시화", "종주도시", "인구예측", "위성영상", "경제지리"], "curriculum": [{"code": "12도탐01-02", "gloss": "도시 발달과정과 다양한 도시 유형 비교"}, {"code": "10통사2-05-01", "gloss": "세계 인구 분포·구조와 인구 문제"}]}, {"id": "2026-07-10-japan-trench", "region": "해외", "category": "지형·지질·재해", "title": "8km 시추가 찾아낸 30m 점토층, 2011년 쓰나미의 범인이었다", "journal": "Science · 2026 · 391(6784):489 · DOI 10.1126/science.ady0234", "researchers": "북애리조나대(NAU) 주도 — Christine Regalla, Patrick Fulton(코넬대) 등 10여 개국 과학자", "source": {"name": "ScienceDaily", "url": "https://www.sciencedaily.com/releases/2026/06/260625060220.htm"}, "summary": "시추선 지큐(Chikyu)가 일본 해구에서 약 8km(2만 6,000피트) 깊이의 사상 최심 과학 시추를 수행해, 단단한 암층 사이에 낀 두께 약 30m의 부드러운 원양성 점토층을 확인했다. 이 층이 '절취선'처럼 작동해 규모 9.1 지진의 파열이 해저면까지 그대로 도달했고, 해저는 단 6분 만에 40~60m 움직였다.", "body": [{"h": "핵심 발견", "p": "일본 시추선 지큐가 해저 아래로 약 2만 6,000피트(약 8km)를 뚫어, 기네스 세계기록이 인정한 '역대 최심 과학 해양 시추'를 달성했다. 그 결과 일본 해구 아래에서 두께 약 100피트(약 30m)의 원양성 점토층을 발견했다 — 수백만 년에 걸쳐 쌓인, 극도로 부드럽고 미끄러운 퇴적층이며, 해구를 따라 수백 마일에 걸쳐 이어져 있었다."}, {"h": "메커니즘 — 왜 그렇게 치명적이었나", "p": "이 점토층은 일종의 자연 '절취선'으로 작동했다. 극도로 집중되고 약한 면을 만들어, 파열이 해저면까지 그대로 전파되기 쉽게 한 것이다. 2011년 규모 9.1 지진에서 파열은 해저 약 15마일 아래에서 시작됐지만, 이 약한 층을 타고 표면까지 도달했다. 그 결과 해저면이 단 6분 만에 130~200피트(약 40~60m) 이동했고, 이 거대한 변위가 쓰나미를 키웠다."}, {"h": "의미", "p": "이 쓰나미로 약 2만 명이 목숨을 잃고 2,000억 달러 넘는 피해가 났다. 이런 약한 지층이 '어디에' 분포하는지 알아내면, 어느 섭입대가 거대한 해저 변위와 쓰나미를 일으킬 수 있는지 미리 가려낼 수 있다. 판 경계의 위치뿐 아니라 그 경계가 '무엇으로 되어 있는가'가 피해 규모를 가른다는 점을 보여준 연구다."}], "talk": "판 경계가 '무엇인가'보다 '무엇으로 되어 있는가'가 피해를 갈랐습니다. 규모와 피해를 곧장 잇는 설명, 다시 볼 대목입니다.", "tags": ["지진", "쓰나미", "섭입대", "해저시추", "판구조론"], "curriculum": [{"code": "12세지02-02", "gloss": "세계 주요 지형과 인간 생활의 상관성"}]}, {"id": "2026-07-10-cliff-sensors", "region": "해외", "category": "지형·지질·재해", "title": "절벽은 무너지기 며칠 전부터 신호를 보낸다", "journal": "JGR: Earth Surface · 2026 · DOI 10.1029/2025JF008562", "researchers": "스크립스 해양연구소(UC 샌디에이고) — Adam Young(해안지형학), Mark Zumberge(지구물리학)", "source": {"name": "Phys.org", "url": "https://phys.org/news/2026-07-sensors-california-cliff-collapses-hours.html"}, "summary": "캘리포니아 해안 절벽 세 곳에 경사계·신축계·라이다·GPS를 4년간 설치했더니, 그사이 일어난 붕괴 5건 모두에서 몇 시간~며칠 전 전조 변형이 잡혔다. 2024년 델마의 200톤 붕괴 직전 균열은 하루 0.4mm씩 벌어졌는데, 육안으로는 전혀 보이지 않았다.", "body": [{"h": "핵심 발견", "p": "스크립스 해양연구소가 4년간 관측한 결과, 기록된 붕괴 5건 모두에서 붕괴 몇 시간~며칠 전에 지반 변형이 센서에 포착됐다. 붕괴 규모는 수 세제곱야드에서 수백 세제곱야드까지 다양했다. 사용한 장비는 정밀했다 — 경사계는 1m 기준선에서 10마이크로미터(사람 머리카락 굵기의 약 8분의 1) 정확도, 광섬유 신축계는 나노미터(10억분의 1m) 수준의 변형까지 감지했고, 여기에 지진계·GPS·파압 센서와 매주 라이다 측량(2022~2025년)이 더해졌다."}, {"h": "사례 — 2024년 4월 델마", "p": "2024년 4월 21일 델마 철도 회랑에서 약 200톤이 무너졌다. 센서는 0.1인치(약 2.5mm) 길이의 균열이 하루 0.4mm씩 벌어지는 것을 추적했는데, 이는 육안으로는 감지할 수 없는 속도였다. 붕괴 이틀 전인 4월 19일 경사 측정값이 가속되면서 해안 관리자에게 임박한 붕괴를 알렸다."}, {"h": "의미", "p": "캘리포니아 해안의 약 70%가 침식성 절벽이다. 2019년 8월 엔시니타스 붕괴로 세 여성이 숨진 사건이 이 연구(주 법안 AB66)를 낳았다. 연구진은 강우량과 산사태 활동을 잇는 예비 임계값을 도출해 '확률형 해안 산사태 경보 체계'의 토대를 제시했고, 해변 폐쇄·절벽 상단 접근 제한·주민 교육 프로토콜을 권고했다."}], "talk": "캘리포니아 해안의 70%가 침식 절벽입니다. 동해안 해식애에도 같은 센서를 붙일 만할까요, 아니면 그 예산은 다른 곳이 먼저일까요.", "tags": ["해안침식", "지형재해", "조기경보", "라이다", "원격탐사"], "curriculum": [{"code": "12한탐04-03", "gloss": "자연재해의 유형·특징과 경감 대책"}]}, {"id": "2026-07-10-mcb-enso", "region": "해외", "category": "기후·기상", "title": "구름을 밝히면 엘니뇨가 61% 약해진다", "journal": "Earth's Future · 2025 · 13(8) · DOI 10.1029/2025EF006522", "researchers": "UC 샌타바버라 브렌 스쿨 — Chen Xing, Cali Pfleger, Samantha Stevenson", "source": {"name": "ScienceDaily", "url": "https://www.sciencedaily.com/releases/2026/06/260626030448.htm"}, "summary": "동태평양에 '해양 구름 밝히기(MCB)'를 적용하면 엘니뇨-남방진동(ENSO) 진폭이 약 61% 줄어드는 반면, 성층권 에어로졸 주입(SAI)은 ENSO를 거의 건드리지 않았다. 같은 온난화 목표에 도달해도 지역 기후에 남기는 흔적은 전혀 달랐다는 뜻이다.", "body": [{"h": "핵심 발견", "p": "아열대 동태평양에 해양 구름 밝히기(MCB)를 적용하는 시뮬레이션에서 ENSO 진폭이 약 61% 감소했다. 구름을 인위적으로 밝게 만드는 개입이 엘니뇨/라니냐의 진동 폭 자체를 크게 눌러버린 것이다."}, {"h": "메커니즘", "p": "연구진이 짚은 인과 사슬은 이렇다. 밝아진 구름이 아래 해수면을 식히는 동시에 강수를 줄이고(작아진 물방울이 잘 뭉치지 않는다), 차고 건조해진 공기가 중태평양으로 퍼진다. 그러면 증발이 줄고 대기 순환이 약해지며 적도풍이 강해지고, 이것이 찬물 용승을 늘려 해수면을 더 식힌다 — 스스로를 강화하는 고리다."}, {"h": "비교와 함의", "p": "또 다른 기후공학 기법인 성층권 에어로졸 주입(SAI)은 ENSO에 거의 영향이 없었다. 황산염 입자가 전 지구에 고르게 퍼지는 반면 MCB는 특정 해역에 국지적으로 작용하기 때문으로 보인다. 스티븐슨 교수는 \"두 개입이 전 지구적으로 같은 온난화 목표에 도달하고도 지역 기후에는 전혀 다른 영향을 남길 수 있다\"고 말했다."}], "talk": "10년 만의 61% 변화는 자연 변동에 없던 속도입니다. 엘니뇨는 '고쳐도' 되는 것일까요.", "tags": ["기후공학", "엘니뇨", "ENSO", "대기순환", "해양"], "curriculum": [{"code": "12기지01-01", "gloss": "기후변화를 바라보는 관점의 다양성"}]}, {"id": "2026-07-10-hyejeong-map", "region": "국내", "category": "지도·GIS", "title": "경희대 혜정박물관, 여름방학 '지도로 보는 조선' 체험", "journal": "중부일보 · 2026.7.10", "researchers": "경희대학교 혜정박물관", "source": {"name": "중부일보", "url": "https://www.joongboo.com/news/articleView.html?idxno=363731116"}, "summary": "지도 기초 이론부터 고지도 실물 관람까지 아우르는 여름방학 체험 프로그램. 8월 4~7일 개인, 8월 10~13일 단체 대상으로 운영된다.", "body": [{"h": "무엇인가", "p": "경희대 혜정박물관이 여름방학을 맞아 '지도로 보는 조선' 체험 프로그램을 연다. 지도의 기초 이론부터 조선 시대 고지도 실물 관람까지 이어지는 구성으로, 8월 4~7일은 개인, 8월 10~13일은 단체를 대상으로 진행된다. 지도 투영·기호·제작 원리를 수업에서 다룰 때 연결 지을 만한 현장 자료다."}], "talk": "고지도 실물은 '지도는 세계의 축소가 아니라 해석'이라는 걸 학생들이 눈으로 확인하기 좋은 자료죠.", "tags": ["지리교육", "고지도", "답사", "지도학"], "curriculum": []}, {"id": "2026-07-10-seoul-urban-politics", "region": "국내", "category": "인구·도시", "title": "\"서울은 시장의 전유물이 아니다\" — 도시공간의 정치적 생산 연구", "journal": "교수신문 · 2026.7.7", "researchers": "서울대학교 지리학과 (2026년 2월 박사학위)", "source": {"name": "교수신문", "url": "https://www.kyosu.net/news/articleView.html?idxno=207160"}, "summary": "시장이 바뀔 때마다 뒤바뀌는 도시공간을 다룬 「도시공간의 정치적 생산과 정치자산화 과정 연구」로 올해 2월 서울대 지리학과에서 박사학위가 나왔다.", "body": [{"h": "무엇인가", "p": "「도시공간의 정치적 생산과 정치자산화 과정 연구」는 시장(市長)이 바뀔 때마다 방향이 뒤바뀌는 서울의 도시공간을 정치적 생산물로 읽어낸다. 올해 2월 서울대 지리학과 박사학위 논문으로, 앙리 르페브르 계열의 '공간의 (사회적) 생산' 논의를 한국 대도시 정책의 구체적 사례에 붙여 볼 수 있는 국내 연구다."}], "talk": "'공간은 만들어진다'는 명제를 서울 지도 위에서 확인할 수 있는 국내 사례입니다.", "tags": ["도시지리", "공간의생산", "정치지리", "서울"], "curriculum": [{"code": "12도탐04-02", "gloss": "도시 정치의 중요성과 시민의 참여"}]}]}]};

let active = "전체";

function chipsHtml() {
  const all = `<button class="chip on" data-cat="전체">전체<span class="n">${DATA.days.reduce((s,d)=>s+d.articles.length,0)}</span></button>`;
  return all + cats.map(c =>
    `<button class="chip" data-cat="${esc(c)}">${esc(c)}<span class="n">${catCount[c]}</span></button>`
  ).join("");
}

function cardHtml(a) {
  const sections = (a.body||[]).map(s =>
    `<div class="section"><h4>${esc(s.h)}</h4><p>${esc(s.p)}</p></div>`).join("");
  const heads = (a.body||[]).map(s => s.h).join(" · ");
  const deep = sections
    ? `<div class="deep" data-collapsed="1"><div class="deep-body">${sections}</div>` +
      `<button class="deep-toggle" type="button" data-heads="${esc(heads)}">` +
      `<span class="tw">⌄</span> ${esc(heads)} <span class="more-cta">펼쳐보기</span></button></div>`
    : "";
  const tags = (a.tags||[]).map(t => `<span class="tag">#${esc(t)}</span>`).join("");
  const who = a.researchers ? `<p class="who">${esc(a.researchers)}</p>` : "";
  const curric = (a.curriculum||[]).length
    ? `<div class="curric"><span class="curric-label">🎓 교육과정 연계</span>` +
      a.curriculum.map(c => `<span class="curric-item"><b>${esc(c.code)}</b> ${esc(c.gloss)}</span>`).join("") +
      `</div>`
    : "";
  return `<article class="card" data-cat="${esc(a.category)}">
    <div class="meta">
      <span class="badge">${esc(a.category)}</span>
      <span class="badge region">${esc(a.region)}</span>
      <span class="journal">${esc(a.journal||"")}</span>
    </div>
    <h3 class="title">${esc(a.title)}</h3>
    ${who}
    ${deep}
    ${curric}
    <div class="talk"><b>💬</b> ${esc(a.talk)}</div>
    <div class="foot">
      <div class="tags">${tags}</div>
      <a class="src" href="${esc(a.source.url)}" target="_blank" rel="noopener">${esc(a.source.name)} →</a>
    </div>
  </article>`;
}

function render() {
  const feed = document.getElementById("feed");
  let html = "";
  DATA.days.forEach(d => {
    const shown = d.articles.filter(a => active==="전체" || a.category===active);
    if (!shown.length) return;
    const [y,m,dd] = d.date.split("-");
    html += `<section class="day">
      <div class="day-head">
        <span class="day-date">${y}. ${+m}. ${+dd}.</span>
        <span class="day-wd">(${esc(d.weekday||"")})</span>
      </div>
      ${shown.map(cardHtml).join("")}
    </section>`;
  });
  feed.innerHTML = html || `<p class="empty">이 분야의 기사가 아직 없습니다.</p>`;
  // 본문이 짧아 클램프 안에 다 들어가면 페이드·버튼을 없앤다.
  // 반드시 레이아웃(클램프 적용) 이후에 측정해야 한다 — rAF로 다음 프레임에 실행.
  requestAnimationFrame(() => feed.querySelectorAll(".deep").forEach(deep => {
    const body = deep.querySelector(".deep-body");
    if (body.scrollHeight <= body.clientHeight + 4) deep.setAttribute("data-fits", "1");
  }));
}

document.getElementById("chips").innerHTML = chipsHtml();
document.getElementById("chips").addEventListener("click", e => {
  const b = e.target.closest(".chip"); if (!b) return;
  active = b.dataset.cat;
  document.querySelectorAll(".chip").forEach(c => c.classList.toggle("on", c===b));
  render();
});
document.getElementById("feed").addEventListener("click", e => {
  const btn = e.target.closest(".deep-toggle"); if (!btn) return;
  const deep = btn.closest(".deep");
  const collapsed = deep.getAttribute("data-collapsed") === "1";
  deep.setAttribute("data-collapsed", collapsed ? "0" : "1");
  btn.innerHTML = collapsed
    ? `<span class="tw">⌃</span> 접기`
    : `<span class="tw">⌄</span> ${btn.dataset.heads} <span class="more-cta">펼쳐보기</span>`;
});
render();
</script>
</body>
</html>
